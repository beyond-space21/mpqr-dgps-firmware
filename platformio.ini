[env:freenove_esp32_s3_wroom]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = espidf

; Upload fixes for Linux + native USB
upload_protocol = esptool
; upload_port = /dev/ttyACM1
upload_speed = 921600
upload_flags =
    --before=no_reset
    --after=no_reset

; Monitor fixes
; monitor_port = /dev/ttyACM1
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0